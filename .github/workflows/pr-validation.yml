name: PR Validation

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pr-validation-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Run static validation
        run: npm run validate:static

      - name: Run type check
        run: npm run typecheck

      - name: Run browser tests
        run: npm run test:e2e

      - name: Run Lighthouse audit
        run: npm run audit:lighthouse

      - name: Run production Lighthouse audit
        if: github.event_name == 'workflow_dispatch'
        run: npm run audit:lighthouse:production

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          if-no-files-found: ignore
          retention-days: 7

      - name: Upload Lighthouse report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-report
          path: lighthouse-reports/
          if-no-files-found: ignore
          retention-days: 7
