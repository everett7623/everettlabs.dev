  <text x="100" y="374" font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="28" fill="#9aa4af"><tspan x="100" dy="0">A local-first bookmark workspace for Chrome and Edge,</tspan><tspan x="100" dy="40">designed for large collections, fast search, link</tspan><tspan x="100" dy="40">scanning, and safe cleanup.</tspan></text>
  <line x1="100" y1="500" x2="1100" y2="500" stroke="#22d3ee" stroke-opacity="0.35" stroke-width="2"/>
  <text x="100" y="552" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="20" fill="#65707c">everettlabs.dev/projects/favgrove</text>
