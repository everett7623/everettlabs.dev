<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title description">
  <title id="title">FavGrove — Everett Labs</title>
  <desc id="description">A local-first bookmark workspace for Chrome and Edge, designed for large collections, fast search, link scanning, and safe cleanup.</desc>
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="#07080a"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <rect x="80" y="76" width="6" height="478" rx="3" fill="#22d3ee"/>
  <text x="100" y="126" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="22" fill="#22d3ee" letter-spacing="4">EVERETT LABS / PROJECT</text>
  <text x="100" y="190" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="20" fill="#65707c" letter-spacing="2">BROWSER EXTENSION</text>
